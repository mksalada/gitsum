<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitSum</title>

<style>
:root {
  --bg: #ffffff;
  --text: #111827;
  --muted: #6b7280;
  --card: #f9fafb;
  --border: #e5e7eb;
}

[data-theme="dark"] {
  --bg: #111827;
  --text: #f9fafb;
  --muted: #9ca3af;
  --card: #1f2933;
  --border: #374151;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 1rem;
}

/* Skip link */
.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: black;
  color: white;
  padding: 0.5rem;
}
.skip-link:focus {
  top: 0;
}

input, select, button {
  width: 100%;
  padding: 0.6rem;
  margin: 0.4rem 0;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 1rem;
}

/* Focus accessibility */
button:focus, input:focus, select:focus {
  outline: 2px solid #3b82f6;
  outline-offset: 2px;
}

button {
  cursor: pointer;
  min-height: 44px;
  transition: transform 0.1s ease, opacity 0.2s ease;
}

button:active {
  transform: scale(0.97);
}

/* Toggle button */
.toggle {
  width: auto;
  font-size: 0.8rem;
  padding: 0.3rem 0.6rem;
  float: right;
}

/* Alert */
.alert {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.7rem;
  border-radius: 8px;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted);
  transition: all 0.2s ease;
}

.alert.warning {
  border-color: #facc15;
  background: rgba(250, 204, 21, 0.1);
  color: #f59e0b;
  box-shadow: 0 0 12px rgba(250, 204, 21, 0.25);
}

.alert.danger {
  border-color: #f87171;
  background: rgba(248, 113, 113, 0.1);
  color: #ef4444;
  box-shadow: 0 0 14px rgba(248, 113, 113, 0.3);
}

/* Output panel */
.output-panel {
  min-height: 300px;
  padding: 1rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  font-family: monospace;
  white-space: pre-wrap;
  overflow-y: auto;
}

.placeholder {
  color: var(--muted);
  font-style: italic;
}

/* Animation */
.fade-in {
  animation: fadeIn 0.3s ease-in-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Mobile */
@media (max-width: 600px) {
  h1 { font-size: 1.5rem; }
}
</style>
</head>

<body>

<a href="#output" class="skip-link">Skip to output</a>

<div class="container">

<button class="toggle" id="themeToggle">🌙</button>

<h1>GitSum</h1>

<div id="rateLimitBox" class="alert info">
  ℹ️ Using public GitHub API (60 requests/hour)
</div>

<label for="repo">Repository</label>
<input id="repo" placeholder="username/repo" aria-label="GitHub repository">

<label for="branch">Branch</label>
<select id="branch" aria-label="Select branch"></select>

<label for="format">Export Format</label>
<select id="format">
  <option value="md">Markdown</option>
  <option value="json">JSON</option>
  <option value="txt">Text</option>
</select>

<button id="generate">Generate</button>
<button id="download">Download</button>

<h2>Preview</h2>
<div id="output" class="output-panel" aria-live="polite">
  <div class="placeholder">Your summary will appear here...</div>
</div>

</div>

<script>
// Theme toggle
const toggle = document.getElementById("themeToggle");
toggle.onclick = () => {
  const html = document.documentElement;
  const dark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", dark ? "light" : "dark");
};

// Enter key support
document.getElementById("repo").addEventListener("keypress", e => {
  if (e.key === "Enter") document.getElementById("generate").click();
});

const outputEl = document.getElementById("output");

async function fetchJSON(url) {
  const res = await fetch(url);
  updateRateLimit(res);
  if (!res.ok) throw new Error("API error");
  return res.json();
}

async function loadBranches(repo) {
  const data = await fetchJSON(`https://api.github.com/repos/${repo}/branches`);
  const select = document.getElementById("branch");
  select.innerHTML = "";
  data.forEach(b => {
    const opt = document.createElement("option");
    opt.value = b.name;
    opt.textContent = b.name;
    select.appendChild(opt);
  });
}

async function fetchCommits(repo, branch, page=1) {
  return fetchJSON(`https://api.github.com/repos/${repo}/commits?sha=${branch}&per_page=100&page=${page}`);
}

async function getAllCommits(repo, branch) {
  let all = [], page = 1;
  while (true) {
    const data = await fetchCommits(repo, branch, page);
    if (!data.length) break;
    all = all.concat(data);
    page++;
  }
  return all;
}

function format(commits, type) {
  commits.sort((a,b)=>new Date(b.commit.author.date)-new Date(a.commit.author.date));
  if (type === "json") return JSON.stringify(commits, null, 2);

  let out = "";
  for (const c of commits) {
    const date = c.commit.author.date.slice(0,10);
    const msg = c.commit.message.split("\n")[0];
    const sha = c.sha.slice(0,7);
    const url = c.html_url;
    const author = c.commit.author.name;

    if (type === "md") {
      out += `## ${date}\n- **${msg}**\n- ${author}\n- \`${sha}\`\n- ${url}\n\n`;
    } else {
      out += `${date} | ${msg} | ${author}\n`;
    }
  }
  return out;
}

document.getElementById("generate").onclick = async () => {
  const repo = repoInput.value.trim();
  const branch = branchSelect.value;
  const formatType = document.getElementById("format").value;

  outputEl.innerHTML = `<div class="placeholder fade-in">⏳ Fetching...</div>`;

  try {
    await loadBranches(repo);
    const commits = await getAllCommits(repo, branch);
    const result = format(commits, formatType);
    outputEl.innerHTML = `<pre class="fade-in">${result}</pre>`;
  } catch (err) {
    outputEl.innerHTML = `<div class="placeholder fade-in">❌ ${err.message}</div>`;
  }
};

document.getElementById("download").onclick = () => {
  const text = outputEl.innerText;
  const type = document.getElementById("format").value;
  const blob = new Blob([text]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `COMMITS.${type}`;
  a.click();
};

function updateRateLimit(res) {
  const box = document.getElementById("rateLimitBox");
  const r = parseInt(res.headers.get("X-RateLimit-Remaining"));
  const limit = res.headers.get("X-RateLimit-Limit");

  box.classList.remove("warning","danger");

  if (r <= 0) {
    box.classList.add("danger");
    box.innerHTML = `🚫 Rate limit exceeded (${limit}/hour)`;
  } else if (r <= 5) {
    box.classList.add("warning");
    box.innerHTML = `⚠️ Low quota: ${r}/${limit}`;
  } else {
    box.innerHTML = `ℹ️ ${r}/${limit} requests remaining`;
  }
}
</script>

</body>
</html>
