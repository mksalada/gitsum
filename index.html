<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitSum</title>

<style>
:root {
  --bg: #ffffff;
  --card: #f9fafb;
  --text: #111827;
  --muted: #6b7280;
  --accent: #22c55e;
  --border: #e5e7eb;
}

body.dark {
  --bg: #0f172a;
  --card: #111827;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --border: #1f2937;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 2rem;
}

.container {
  width: 100%;
  max-width: 800px;
  background: var(--card);
  padding: 2rem;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

h1 { margin-bottom: 0; }
.subtitle {
  color: var(--muted);
  margin-top: 0.25rem;
  margin-bottom: 1.5rem;
}

label {
  font-size: 0.9rem;
  color: var(--muted);
}

input, select, textarea {
  width: 100%;
  padding: 0.6rem;
  margin-top: 0.3rem;
  margin-bottom: 1rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
}

textarea {
  height: 300px;
  white-space: pre;
}

button {
  width: 100%;
  padding: 0.7rem;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 0.5rem;
}

#generate {
  background: var(--accent);
  color: black;
}

#download {
  background: #374151;
  color: white;
}

.row {
  display: flex;
  gap: 1rem;
}

.row > div {
  flex: 1;
}

#toggleTheme {
  width: auto;
  padding: 0.3rem 0.6rem;
  font-size: 0.75rem;
  border-radius: 5px;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  cursor: pointer;
}

#toggleTheme:hover {
  background: var(--border);
}

.info-box {
  padding: 0.6rem;
  border-radius: 6px;
  font-size: 0.85rem;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted);
}

footer {
  text-align: center;
  margin-top: 1rem;
  font-size: 0.8rem;
  color: var(--muted);
}
</style>
</head>

<body>

<div class="container">

<div style="display:flex; justify-content:flex-end;">
  <button id="toggleTheme">🌙 Dark Mode</button>
</div>

<h1>GitSum</h1>
<p class="subtitle">Summarize your GitHub commits instantly.</p>

<div id="rateLimitBox" class="info-box">
  ℹ️ Using public GitHub API (no authentication). Limit: 60 requests/hour.
</div>

<label>Repository</label>
<input type="text" id="repo" placeholder="username/repo">

<label>Branch</label>
<select id="branch">
  <option>Enter repo first</option>
</select>

<label>Format</label>
<select id="format">
  <option value="md">Markdown</option>
  <option value="json">JSON</option>
  <option value="txt">Text</option>
</select>

<button id="generate">Generate Summary</button>

<label>Output</label>
<textarea id="output" readonly></textarea>

<button id="download">Download File</button>

<footer>Built with ⚡ GitSum</footer>

</div>

<script>
// THEME TOGGLE
const toggleBtn = document.getElementById("toggleTheme");

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
  toggleBtn.textContent = "☀️ Light Mode";
}

toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  toggleBtn.textContent = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
  localStorage.setItem("theme", isDark ? "dark" : "light");
});

// RATE LIMIT UI
function updateRateLimit(res) {
  const box = document.getElementById("rateLimitBox");
  const remaining = res.headers.get("X-RateLimit-Remaining");
  const limit = res.headers.get("X-RateLimit-Limit");
  if (!remaining || !limit) return;

  const r = parseInt(remaining);

  if (r <= 5) {
    box.textContent = `⚠️ Low API quota: ${remaining}/${limit} (unauthenticated)`;
    box.style.color = "#f87171";
  } else {
    box.textContent = `ℹ️ ${remaining}/${limit} requests remaining (public API)`;
    box.style.color = "var(--muted)";
  }
}

// FETCH HELPERS
async function fetchRepoInfo(repo) {
  const res = await fetch(`https://api.github.com/repos/${repo}`);
  updateRateLimit(res);
  if (!res.ok) throw new Error("Repository not found");
  return res.json();
}

async function fetchBranches(repo) {
  let branches = [];
  let page = 1;

  while (true) {
    const res = await fetch(`https://api.github.com/repos/${repo}/branches?per_page=100&page=${page}`);
    updateRateLimit(res);

    if (!res.ok) break;

    const data = await res.json();
    branches = branches.concat(data);

    if (data.length < 100) break;
    page++;
  }

  return branches.map(b => b.name);
}

async function loadBranches(repo) {
  const select = document.getElementById("branch");
  const output = document.getElementById("output");

  select.innerHTML = "<option>Loading...</option>";
  output.value = "🔍 Loading repository...";

  try {
    const repoInfo = await fetchRepoInfo(repo);
    const defaultBranch = repoInfo.default_branch;

    const branches = await fetchBranches(repo);

    select.innerHTML = "";
    branches.forEach(b => {
      const opt = document.createElement("option");
      opt.value = b;
      opt.textContent = b;
      if (b === defaultBranch) opt.selected = true;
      select.appendChild(opt);
    });

    output.value = `✅ Loaded ${branches.length} branches`;

  } catch (err) {
    select.innerHTML = "<option>Error</option>";
    output.value = "❌ " + err.message;
  }
}

document.getElementById("repo").addEventListener("change", (e) => {
  const repo = e.target.value.trim();
  if (/^[^\/\s]+\/[^\/\s]+$/.test(repo)) {
    loadBranches(repo);
  }
});

// COMMITS
async function fetchAllCommits(repo, branch) {
  let all = [];
  let page = 1;

  while (true) {
    const res = await fetch(`https://api.github.com/repos/${repo}/commits?sha=${branch}&per_page=100&page=${page}`);
    updateRateLimit(res);

    if (res.status === 403) throw new Error("rate limit");
    if (!res.ok) break;

    const data = await res.json();
    all = all.concat(data);

    if (data.length < 100) break;
    page++;
  }

  return all;
}

// FORMATTERS
function normalize(commits) {
  return commits.map(c => ({
    date: c.commit.author.date.slice(0,10),
    sha: c.sha.slice(0,7),
    author: c.commit.author.name,
    message: c.commit.message.split("\n")[0],
    url: c.html_url
  }));
}

function toMD(d) {
  return d.map(c =>
`## ${c.date}
- **${c.message}**
- Author: ${c.author}
- SHA: \`${c.sha}\`
- URL: ${c.url}
`).join("\n\n");
}

function toJSON(d) {
  return JSON.stringify(d, null, 2);
}

function toTXT(d) {
  return d.map(c =>
`${c.date} | ${c.message}
Author: ${c.author}
SHA: ${c.sha}
URL: ${c.url}
------------------------------`).join("\n\n");
}

// GENERATE
document.getElementById("generate").addEventListener("click", async () => {
  const repo = document.getElementById("repo").value.trim();
  const branch = document.getElementById("branch").value;
  const format = document.getElementById("format").value;
  const output = document.getElementById("output");

  if (!/^[^\/\s]+\/[^\/\s]+$/.test(repo)) {
    alert("Use format: owner/repo");
    return;
  }

  output.value = "⏳ Fetching commits...";

  try {
    const commits = await fetchAllCommits(repo, branch);
    const data = normalize(commits).sort((a,b)=>new Date(b.date)-new Date(a.date));

    let result = "";
    if (format === "md") result = toMD(data);
    if (format === "json") result = toJSON(data);
    if (format === "txt") result = toTXT(data);

    output.value = result || "No commits found.";

  } catch (err) {
    if (err.message.includes("rate limit")) {
      output.value = "🚫 Rate limit exceeded (60/hr public API)";
    } else {
      output.value = "❌ " + err.message;
    }
  }
});

// DOWNLOAD
document.getElementById("download").addEventListener("click", () => {
  const text = document.getElementById("output").value;
  const format = document.getElementById("format").value;
  const repo = document.getElementById("repo").value || "commits";

  if (!text) return;

  const mime = format === "json" ? "application/json" :
               format === "md" ? "text/markdown" : "text/plain";

  const blob = new Blob([text], { type: mime });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = `${repo.replace("/","_")}_COMMITS.${format}`;
  a.click();
});
</script>

</body>
</html>
