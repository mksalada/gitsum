<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Commit Summary Generator</title>
<style>
  body { font-family: Arial, sans-serif; margin: 2rem; }
  input, button, textarea { font-size: 1rem; margin: 0.5rem 0; width: 100%; }
  textarea { height: 400px; white-space: pre; }
</style>
</head>
<body>
<h1>GitHub Commit Summary Generator</h1>

<label for="repo">GitHub Repository (owner/repo):</label>
<input type="text" id="repo" placeholder="e.g., username/project-name">

<button id="generate">Generate Markdown</button>

<h2>Markdown Preview:</h2>
<textarea id="output" readonly></textarea>

<button id="download">Download COMMITS.md</button>

<script>
async function fetchCommits(ownerRepo, page=1, perPage=100) {
    const url = `https://api.github.com/repos/${ownerRepo}/commits?sha=main&per_page=${perPage}&page=${page}`;
    const res = await fetch(url);
    if (!res.ok) return [];
    return await res.json();
}

async function fetchAllCommits(ownerRepo) {
    let allCommits = [];
    let page = 1;
    while (true) {
        const commits = await fetchCommits(ownerRepo, page);
        if (commits.length === 0) break;
        allCommits = allCommits.concat(commits);
        page++;
    }
    return allCommits;
}

function generateMarkdown(commits) {
    // Sort newest first
    commits.sort((a, b) => new Date(b.commit.author.date) - new Date(a.commit.author.date));
    let md = "";
    for (const c of commits) {
        const date = c.commit.author.date.slice(0,10);
        const sha = c.sha.slice(0,7);
        const author = c.commit.author.name;
        const message = c.commit.message.split("\n")[0];
        const url = c.html_url;
        md += `## ${date}\n- **${message}**\n- Author: ${author}\n- SHA: \`${sha}\`\n- URL: ${url}\n\n`;
    }
    return md;
}

document.getElementById("generate").addEventListener("click", async () => {
    const repo = document.getElementById("repo").value.trim();
    if (!repo) { alert("Please enter a GitHub repo."); return; }
    document.getElementById("output").value = "Fetching commits... this may take a while.";
    try {
        const commits = await fetchAllCommits(repo);
        const md = generateMarkdown(commits);
        document.getElementById("output").value = md || "No commits found.";
    } catch (err) {
        document.getElementById("output").value = "Error fetching commits: " + err;
    }
});

document.getElementById("download").addEventListener("click", () => {
    const text = document.getElementById("output").value;
    if (!text) return;
    const blob = new Blob([text], {type: "text/markdown"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "COMMITS.md";
    a.click();
    URL.revokeObjectURL(url);
});
</script>
</body>
</html>
